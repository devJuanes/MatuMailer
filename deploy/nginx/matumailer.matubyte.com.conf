# Nginx — matumailer.matubyte.com (dashboard + API en mismo dominio)
# cp deploy/nginx/matumailer.matubyte.com.conf /etc/nginx/sites-available/matumailer.matubyte.com
# ln -sf /etc/nginx/sites-available/matumailer.matubyte.com /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name matumailer.matubyte.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name matumailer.matubyte.com;

    ssl_certificate /etc/letsencrypt/live/matumailer.matubyte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matumailer.matubyte.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/matumailer.matubyte.com.access.log;
    error_log  /var/log/nginx/matumailer.matubyte.com.error.log;

    client_max_body_size 15M;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location /health {
        proxy_pass http://127.0.0.1:4001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://127.0.0.1:4001/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3015;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

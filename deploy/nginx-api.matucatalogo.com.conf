# Copiar a: /etc/nginx/sites-available/api.matucatalogo.com
# Luego: sudo ln -s ... sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name api.matucatalogo.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.matucatalogo.com;

    # Certbot añade estas líneas al obtener el certificado:
    # ssl_certificate /etc/letsencrypt/live/api.matucatalogo.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.matucatalogo.com/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
